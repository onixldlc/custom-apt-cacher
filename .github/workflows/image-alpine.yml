name: Build Alpine Image

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'conf/**'
      - 'CMakeLists.txt'
      - 'build.sh'
      - 'VERSION'
      - 'docker/alpine/**'
      - '.github/workflows/image-alpine.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'conf/**'
      - 'CMakeLists.txt'
      - 'build.sh'
      - 'VERSION'
      - 'docker/alpine/**'
      - '.github/workflows/image-alpine.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: custom-apt-cacher
  OS_TAG: alpine
  DOCKERFILE: ./docker/alpine/Dockerfile
  CONTEXT: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release mode
        id: rel
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "MODE: release (tag push)"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "MODE: build-check only"
          fi

      - name: Get version
        if: steps.rel.outputs.release == 'true'
        id: version
        run: |
          BASE_VERSION="v$(cat VERSION | tr -d '[:space:]')"
          FULL_IMAGE="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}"

          TAGS=$(skopeo list-tags docker://${FULL_IMAGE} 2>/dev/null | jq -r '.Tags[]?' || echo "")

          echo "Base version (from VERSION): ${BASE_VERSION}"
          echo "Found tags: [$TAGS]"

          HIGHEST_REV=0
          for tag in $TAGS; do
            echo "Checking tag: $tag"
            if [[ $tag =~ ^${OS_TAG}-${BASE_VERSION}-r([0-9]+)$ ]]; then
              REV=${BASH_REMATCH[1]}
              echo "  -> Matched! Revision: $REV"
              if [[ $REV -gt $HIGHEST_REV ]]; then
                HIGHEST_REV=$REV
              fi
            fi
          done

          NEXT_REV=$((HIGHEST_REV + 1))
          NEW_VERSION="${OS_TAG}-${BASE_VERSION}-r${NEXT_REV}"

          echo "========================================"
          echo "RESULT: version=${NEW_VERSION}"
          echo "Previous highest revision: r${HIGHEST_REV}"
          echo "========================================"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.rel.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.rel.outputs.release == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ env.OS_TAG }}

      - name: Build (check only)
        if: steps.rel.outputs.release != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: steps.rel.outputs.release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ steps.rel.outputs.release }}" = "true" ]; then
            echo "**Mode:** release" >> $GITHUB_STEP_SUMMARY
            echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:** \`${{ steps.version.outputs.version }}\`, \`${{ env.OS_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Mode:** build-check (no push)" >> $GITHUB_STEP_SUMMARY
            echo "Push a git tag \`v*\` to release." >> $GITHUB_STEP_SUMMARY
          fi
