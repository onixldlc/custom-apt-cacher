name: Build Alpine Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: custom-apt-cacher
  OS_TAG: alpine
  DOCKERFILE: ./docker/alpine/Dockerfile
  CONTEXT: .

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          BASE_VERSION="v$(cat VERSION | tr -d '[:space:]')"
          FULL_IMAGE="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}"

          TAGS=$(skopeo list-tags docker://${FULL_IMAGE} 2>/dev/null | jq -r '.Tags[]?' || echo "")

          echo "Base version (from VERSION): ${BASE_VERSION}"
          echo "Found tags: [$TAGS]"

          HIGHEST_REV=0
          for tag in $TAGS; do
            echo "Checking tag: $tag"
            if [[ $tag =~ ^${OS_TAG}-${BASE_VERSION}-r([0-9]+)$ ]]; then
              REV=${BASH_REMATCH[1]}
              echo "  -> Matched! Revision: $REV"
              if [[ $REV -gt $HIGHEST_REV ]]; then
                HIGHEST_REV=$REV
              fi
            fi
          done

          NEXT_REV=$((HIGHEST_REV + 1))
          NEW_VERSION="${OS_TAG}-${BASE_VERSION}-r${NEXT_REV}"

          echo "========================================"
          echo "RESULT: version=${NEW_VERSION}"
          echo "Previous highest revision: r${HIGHEST_REV}"
          echo "========================================"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.get-version.outputs.version }}
            type=raw,value=${{ env.OS_TAG }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.get-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ needs.get-version.outputs.version }}\`, \`${{ env.OS_TAG }}\`" >> $GITHUB_STEP_SUMMARY
