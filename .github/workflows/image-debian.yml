name: Build Debian Image

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'conf/**'
      - 'CMakeLists.txt'
      - 'build.sh'
      - 'VERSION'
      - 'docker/debian/**'
      - '.github/workflows/image-debian.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'conf/**'
      - 'CMakeLists.txt'
      - 'build.sh'
      - 'VERSION'
      - 'docker/debian/**'
      - '.github/workflows/image-debian.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: custom-apt-cacher
  OS_TAG: debian
  DOCKERFILE: ./docker/debian/Dockerfile
  CONTEXT: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release mode
        id: rel
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "MODE: release (tag push)"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "MODE: build-check only"
          fi

      - name: Get version
        if: steps.rel.outputs.release == 'true'
        id: version
        run: |
          BASE_VERSION="v$(cat VERSION | tr -d '[:space:]')"
          TAG="${GITHUB_REF_NAME}"
          echo "Git tag:          ${TAG}"
          echo "VERSION file:     ${BASE_VERSION}"

          # source of truth for -rN: the git tag itself (format vX.Y.Z-rN).
          # skopeo scan is used only as a fallback when the tag omits -rN.
          if [[ "$TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            TAG_VERSION="${BASH_REMATCH[1]}"
            REV="${BASH_REMATCH[2]}"
            echo "Parsed from tag:  version=${TAG_VERSION} rev=r${REV}"
            if [[ "$TAG_VERSION" != "$BASE_VERSION" ]]; then
              echo "::warning::git tag version ${TAG_VERSION} differs from VERSION file ${BASE_VERSION}"
            fi
          else
            echo "Tag does not match vX.Y.Z-rN; falling back to skopeo scan"
            FULL_IMAGE="${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}"
            TAGS=$(skopeo list-tags docker://${FULL_IMAGE} 2>/dev/null | jq -r '.Tags[]?' || echo "")
            echo "Found registry tags: [$TAGS]"
            HIGHEST_REV=0
            for t in $TAGS; do
              if [[ $t =~ ^${OS_TAG}-${BASE_VERSION}-r([0-9]+)$ ]]; then
                R=${BASH_REMATCH[1]}
                if [[ $R -gt $HIGHEST_REV ]]; then HIGHEST_REV=$R; fi
              fi
            done
            REV=$((HIGHEST_REV + 1))
            echo "Skopeo fallback:  next rev=r${REV}"
          fi

          NEW_VERSION="${OS_TAG}-${BASE_VERSION}-r${REV}"
          echo "========================================"
          echo "RESULT: version=${NEW_VERSION}"
          echo "========================================"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.rel.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.rel.outputs.release == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ env.OS_TAG }}

      - name: Build (check only)
        if: steps.rel.outputs.release != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: steps.rel.outputs.release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ steps.rel.outputs.release }}" = "true" ]; then
            echo "**Mode:** release" >> $GITHUB_STEP_SUMMARY
            echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:** \`${{ steps.version.outputs.version }}\`, \`${{ env.OS_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Mode:** build-check (no push)" >> $GITHUB_STEP_SUMMARY
            echo "Push a git tag \`v*\` to release." >> $GITHUB_STEP_SUMMARY
          fi
